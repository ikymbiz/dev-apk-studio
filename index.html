<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CloudIDE">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" id="dynamicFavicon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjEwMCIgZmlsbD0iIzBkMTExNyIvPjxwYXRoIGQ9Ik0yODAgOTBMMTQwIDI4MGgxMDBsLTQwIDE0MmwxNDAtMTkwSDI0MHoiIGZpbGw9IiNkMjk5MjIiLz48L3N2Zz4=">
    <link rel="apple-touch-icon" id="dynamicAppleIcon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjEwMCIgZmlsbD0iIzBkMTExNyIvPjxwYXRoIGQ9Ik0yODAgOTBMMTQwIDI4MGgxMDBsLTQwIDE0MmwxNDAtMTkwSDI0MHoiIGZpbGw9IiNkMjk5MjIiLz48L3N2Zz4=">
    <title>⚡ Cloud IDE Ultra+</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0d1117; --bg-surface: #161b22; --bg-elevated: #21262d;
            --text-main: #c9d1d9; --text-muted: #6e7681; --text-bright: #f0f6fc;
            --primary: #58a6ff; --primary-dim: #1f3a5f;
            --border: #30363d; --border-light: #484f58;
            --success: #3fb950; --success-dim: #1a3a2a;
            --error: #f85149; --error-dim: #3d1a1a;
            --warning: #d29922; --warning-dim: #3d2e00;
            --accent: #bc8cff;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; overscroll-behavior: none; }
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation; overscroll-behavior: none; }

        /* ── AI Provider Section (Settings) ── */
        .ai-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        .ai-section-title { font-size: 12px; font-weight: 700; color: var(--text-bright); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        details.provider-block { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
        details.provider-block[open] { border-color: var(--primary-dim); }
        details.provider-block summary { padding: 12px 14px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-bright); list-style: none; display: flex; align-items: center; justify-content: space-between; user-select: none; -webkit-user-select: none; min-height: 44px; }
        details.provider-block summary::-webkit-details-marker { display: none; }
        details.provider-block summary::after { content: '▼'; font-size: 9px; color: var(--text-muted); transition: transform 0.2s; }
        details.provider-block[open] summary::after { transform: rotate(180deg); }
        details.provider-block .provider-body { padding: 4px 14px 14px; border-top: 1px solid var(--border); }
        .provider-badge-active { font-size: 9px; background: var(--success-dim); color: var(--success); padding: 2px 8px; border-radius: 10px; margin-left: 8px; border: 1px solid var(--success); }
        .icon-preview { width: 96px; height: 96px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; margin: 8px auto; overflow: hidden; }
        .icon-preview img { width: 100%; height: 100%; object-fit: cover; }
        .icon-preview .icon-empty { font-size: 10px; color: var(--text-muted); text-align: center; padding: 8px; }
        .ai-hint { font-size: 10px; color: var(--text-muted); padding: 6px 0 0; line-height: 1.5; }
        #importInput { display: none; }

        /* ── Header (merged with toolbar) ── */
        header { display: flex; align-items: center; gap: 5px; padding: 0 8px; padding-top: var(--safe-top); min-height: 44px; background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; color: var(--primary); white-space: nowrap; }
        .header-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .repo-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); background: var(--bg-elevated); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }

        /* ── Tabs ── */
        .tab-container { display: flex; background: var(--bg-surface); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 12px; cursor: pointer; font-size: 12px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 6px; white-space: nowrap; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all 0.15s; min-height: 40px; user-select: none; -webkit-user-select: none; }
        .tab:hover { color: var(--text-main); background: var(--bg-elevated); }
        .tab.active { color: var(--text-bright); border-bottom-color: var(--primary); background: var(--bg-main); }
        .tab .tab-close { opacity: 0; font-size: 14px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
        .tab.active .tab-close { opacity: 0.5; }
        .tab .tab-close:active { opacity: 1; background: var(--bg-elevated); }
        .add-tab-btn { padding: 10px 14px; cursor: pointer; color: var(--text-muted); font-size: 16px; min-height: 40px; display: flex; align-items: center; }
        .add-tab-btn:hover { color: var(--primary); }

        /* ── Editor (CodeMirror) ── */
        .editor-wrapper { flex-grow: 1; position: relative; background: var(--bg-main); min-height: 0; overflow: hidden; }
        .editor-pane { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        .editor-pane.active { display: block; }
        .editor-pane .CodeMirror { height: 100%; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; background: var(--bg-main); }

        /* ── Pipeline ── */
        .pipeline-panel { background: var(--bg-surface); border-top: 1px solid var(--border); flex-shrink: 0; display: none; }
        .pipeline-panel.active { display: block; }
        .pipeline-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; border-bottom: 1px solid var(--border); }
        .pipeline-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .pipeline-close { cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px 6px; border-radius: 4px; background: none; border: none; font-weight: normal; }
        .pipeline-close:hover { background: var(--bg-elevated); color: var(--text-main); }
        .pipeline-track { display: flex; align-items: center; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
        .pipeline-track::-webkit-scrollbar { display: none; }
        .pipeline-step { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 56px; position: relative; z-index: 1; }
        .step-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 2px solid var(--border); background: var(--bg-elevated); color: var(--text-muted); transition: all 0.3s; }
        .step-label { font-size: 9px; font-weight: 600; color: var(--text-muted); white-space: nowrap; transition: color 0.3s; }
        .step-detail { font-size: 8px; color: var(--text-muted); white-space: nowrap; min-height: 12px; }
        .pipeline-connector { flex: 1; height: 2px; background: var(--border); min-width: 12px; margin: 0 -2px; position: relative; top: -8px; transition: background 0.3s; }
        .pipeline-step.done .step-icon { border-color: var(--success); background: var(--success-dim); color: var(--success); }
        .pipeline-step.done .step-label { color: var(--success); }
        .pipeline-step.active .step-icon { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); animation: pulse-ring 1.5s ease-in-out infinite; }
        .pipeline-step.active .step-label { color: var(--primary); }
        .pipeline-step.fail .step-icon { border-color: var(--error); background: var(--error-dim); color: var(--error); }
        .pipeline-step.fail .step-label { color: var(--error); }
        @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(88,166,255,0.3)} 50%{box-shadow:0 0 0 6px rgba(88,166,255,0)} }
        .pipeline-elapsed { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); padding: 0 16px 8px; text-align: right; }

        /* ── Console (collapsible) ── */
        .bottom-panel { background: #010409; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; transition: height 0.2s ease; padding-bottom: var(--safe-bottom); }
        .bottom-panel.collapsed { height: 34px !important; overflow: hidden; }
        .console-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; background: var(--bg-surface); border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 34px; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .console-tab { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; display: flex; align-items: center; gap: 6px; }
        .console-tab .chevron { transition: transform 0.2s; font-size: 8px; }
        .bottom-panel.collapsed .console-tab .chevron { transform: rotate(-90deg); }
        .console-actions button { font-size: 10px; padding: 4px 10px; background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); min-height: 28px; }
        #logConsole { flex-grow: 1; padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.5; overflow-y: auto; color: var(--text-muted); }
        .log-suc { color: var(--success) !important; }
        .log-err { color: var(--error) !important; }
        .log-link a { color: var(--primary); text-decoration: underline; }
        #downloadArea { display: none; padding: 8px 16px; background: var(--success-dim); border-top: 1px solid var(--success); }
        #downloadLink { color: var(--success); text-decoration: none; font-weight: 700; font-size: 13px; cursor: pointer; }

        /* ── Overlays (Settings / Deploy) ── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
        .overlay.active { display: flex; }
        .overlay-full { position: fixed; inset: 0; background: var(--bg-main); z-index: 100; display: none; flex-direction: column; }
        .overlay-full.active { display: flex; }
        .modal { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px; padding-bottom: calc(20px + var(--safe-bottom)); width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .modal h3 { margin: 0 0 16px; color: var(--text-bright); font-size: 16px; }
        .settings-header { padding: 12px 16px; padding-top: calc(12px + var(--safe-top)); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .settings-header h2 { margin: 0; font-size: 16px; color: var(--text-bright); }
        .settings-content { padding: 16px; padding-bottom: calc(16px + var(--safe-bottom)); max-width: 560px; margin: 0 auto; width: 100%; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
        .field-group { margin-bottom: 16px; }
        .field-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
        .field-group .hint { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

        /* ── Form ── */
        .field-group input, .field-group select, .settings-content select { background: var(--bg-elevated); color: var(--text-main); border: 1px solid var(--border); padding: 10px 12px; border-radius: 8px; font-size: 16px; font-family: 'JetBrains Mono', monospace; width: 100%; transition: border-color 0.15s; min-height: 44px; -webkit-appearance: none; }
        .field-group input:focus, .field-group select:focus { outline: none; border-color: var(--primary); }
        .field-group input::placeholder { color: var(--text-muted); }
        button { background: var(--primary); color: var(--text-bright); cursor: pointer; border: none; font-weight: 600; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; min-height: 44px; -webkit-appearance: none; }
        button:active { transform: scale(0.97); opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:active { color: var(--text-main); background: var(--bg-elevated); }
        .btn-danger { background: var(--error-dim); color: var(--error); border: 1px solid var(--error); }
        .btn-danger:active { background: var(--error); color: white; }
        .btn-full { width: 100%; padding: 14px; font-size: 14px; }
        .btn-sm { padding: 6px 10px; font-size: 12px; min-height: 36px; }
        .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>

<!-- ── Header (clean: no app inputs) ── -->
<header>
    <span class="logo">⚡ IDE</span>
    <button class="btn-ghost btn-sm" onclick="exportZip()">📦</button>
    <button class="btn-ghost btn-sm" id="importBtn" title="インポート" onclick="document.getElementById('importInput').click()">📥</button>
    <button class="btn-ghost btn-sm" id="translateBtn" title="AI Kotlin翻訳" onclick="translateToKotlin()">🤖</button>
    <input type="file" id="importInput" multiple accept=".html,.htm,.css,.js,.mjs,.json,.kt,.kts,.xml,.md,.txt,.zip" onchange="handleImport(this)">
    <span class="repo-badge" id="activeRepoDisplay">未接続</span>
    <div class="header-actions">
        <button class="btn-sm" id="deployBtn">🚀 デプロイ</button>
        <button class="btn-ghost btn-sm" id="openSettingsBtn">⚙</button>
    </div>
</header>

<div class="tab-container" id="tabBar">
    <div class="add-tab-btn" onclick="addNewFile()">+ 新規</div>
</div>
<div class="editor-wrapper" id="editorWrapper"></div>

<!-- ── Pipeline ── -->
<div class="pipeline-panel" id="pipelinePanel">
    <div class="pipeline-header">
        <span class="pipeline-title">Pipeline</span>
        <button class="pipeline-close" onclick="closePipeline()">✕</button>
    </div>
    <div class="pipeline-track">
        <div class="pipeline-step" id="step-upload" data-step="upload"><div class="step-icon">📦</div><div class="step-label">Upload</div><div class="step-detail">www.zip</div></div>
        <div class="pipeline-connector" id="conn-1"></div>
        <div class="pipeline-step" id="step-commit" data-step="commit"><div class="step-icon">📝</div><div class="step-label">Commit</div><div class="step-detail">.kt</div></div>
        <div class="pipeline-connector" id="conn-2"></div>
        <div class="pipeline-step" id="step-trigger" data-step="trigger"><div class="step-icon">⚡</div><div class="step-label">Trigger</div><div class="step-detail"></div></div>
        <div class="pipeline-connector" id="conn-3"></div>
        <div class="pipeline-step" id="step-build" data-step="build"><div class="step-icon">🔨</div><div class="step-label">Build</div><div class="step-detail"></div></div>
        <div class="pipeline-connector" id="conn-4"></div>
        <div class="pipeline-step" id="step-done" data-step="done"><div class="step-icon">📥</div><div class="step-label">APK</div><div class="step-detail"></div></div>
    </div>
    <div class="pipeline-elapsed" id="pipelineElapsed"></div>
</div>

<!-- ── Console ── -->
<div class="bottom-panel collapsed" id="bottomPanel" style="height:120px;">
    <div class="console-header" onclick="toggleConsole()">
        <span class="console-tab"><span class="chevron">▼</span> Console</span>
        <div class="console-actions"><button onclick="event.stopPropagation();document.getElementById('logConsole').innerHTML=''">クリア</button></div>
    </div>
    <div id="logConsole"></div>
    <div id="downloadArea"><a id="downloadLink">📥 APKをダウンロード</a></div>
</div>

<!-- ── Deploy Dialog (app name / ID をここで入力) ── -->
<div class="overlay" id="deployOverlay">
    <div class="modal">
        <h3>🚀 デプロイ設定</h3>
        <div class="field-group">
            <label>アプリ名</label>
            <input type="text" id="appName" placeholder="My App" value="My App">
        </div>
        <div class="field-group">
            <label>パッケージID</label>
            <input type="text" id="appId" placeholder="com.example.app" value="com.example.app" autocapitalize="none" autocorrect="off" spellcheck="false">
            <div class="hint">Java パッケージ形式（例: com.example.app）</div>
        </div>
        <div class="field-group">
            <label>ブランチ</label>
            <input type="text" id="branchName" placeholder="main" value="main" autocapitalize="none">
        </div>
        <div class="field-group">
            <label>リポジトリ</label>
            <div id="deployRepoName" style="font-family:'JetBrains Mono',monospace; font-size:13px; padding:8px 0; color:var(--text-bright);"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-ghost" onclick="closeDeployDialog()">キャンセル</button>
            <button id="confirmDeployBtn" onclick="executeDeploy()">デプロイ実行</button>
        </div>
    </div>
</div>

<!-- ── Settings ── -->
<div class="overlay-full" id="settingsOverlay">
    <div class="settings-header">
        <h2>Settings</h2>
        <button class="btn-ghost btn-sm" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-content">
        <div class="field-group">
            <label>GitHub Token</label>
            <input type="password" id="ghToken" placeholder="ghp_..." autocapitalize="none" autocorrect="off">
            <button class="btn-ghost btn-full" id="verifyTokenBtn" style="margin-top:8px;">🔗 トークンを検証</button>
        </div>
        <div class="field-group">
            <label>対象リポジトリ</label>
            <select id="repoSelect"><option value="">トークンを設定してください...</option></select>
        </div>
        <button id="saveSettingsBtn" class="btn-full" style="margin-bottom:16px;">💾 適用して閉じる</button>

        <div class="ai-section">
            <div class="ai-section-title">🤖 AI Provider</div>
            <div class="field-group">
                <label>アクティブプロバイダ</label>
                <select id="activeProvider">
                    <option value="claude">Claude (Anthropic)</option>
                    <option value="openai">GPT (OpenAI)</option>
                    <option value="gemini">Gemini (Google)</option>
                    <option value="xai">Grok (xAI)</option>
                </select>
                <div class="hint">Kotlin翻訳に使用するAIを選択</div>
            </div>
            <div id="providerBlocks"></div>
        </div>

        <div class="ai-section">
            <div class="ai-section-title">🎨 アイコン生成 (Gemini)</div>
            <div class="field-group">
                <label>画像生成モデル</label>
                <select id="iconModel"></select>
            </div>
            <div class="icon-preview" id="iconPreview">
                <div class="icon-empty">未生成</div>
            </div>
            <button class="btn-ghost btn-full" id="generateIconBtn" onclick="generateIcon()" style="margin-top:8px;">🎨 アイコンを生成</button>
            <button class="btn-ghost btn-full" id="resetIconBtn" onclick="resetIcon()" style="margin-top:8px;">↺ デフォルトに戻す</button>
            <div class="ai-hint">Geminiの画像生成APIを使用します。GeminiのAPIキーが必要です。</div>
        </div>

        <div style="padding-top:20px; margin-top:20px; border-top:1px solid var(--border);">
            <button class="btn-danger btn-full" onclick="clearAllData()">🗑 データを初期化</button>
        </div>
    </div>
</div>

<script>
    // ─── State ───

    // ─── DB (cached, error-safe) ───
    let _dbCache = null;
    const getDB = () => {
        if (_dbCache) return Promise.resolve(_dbCache);
        return new Promise((res, rej) => {
            try {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
                req.onsuccess = e => { _dbCache = e.target.result; res(_dbCache); };
                req.onerror = e => rej(new Error('IndexedDB failed: ' + e.target.error));
                req.onblocked = () => rej(new Error('IndexedDB blocked'));
            } catch (e) { rej(new Error('IndexedDB unavailable')); }
        });
    };
    let _dbWarn = false;
    async function dbSave(key, val) {
        try { const db = await getDB(); return new Promise((res, rej) => { const tx = db.transaction(STORE_NAME,'readwrite'); tx.objectStore(STORE_NAME).put(val,key); tx.oncomplete=()=>res(); tx.onerror=e=>rej(e.target.error); });
        } catch(e) { if(!_dbWarn){_dbWarn=true; log("データ保存に失敗。変更はタブを閉じると失われます","err");} }
    }
    async function dbGet(key) {
        try { const db = await getDB(); return new Promise((res,rej)=>{ const r=db.transaction(STORE_NAME).objectStore(STORE_NAME).get(key); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e.target.error); });
        } catch(e) { return undefined; }
    }

    // ─── Logging (XSS-safe) ───

        const div = document.createElement('div');
        div.className = type ? `log-${type}` : '';

    function setStep(id, state, detail) {

    // ─── CodeMirror: mode detection ───
    function getMode(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const map = { html:'htmlmixed', htm:'htmlmixed', js:'javascript', mjs:'javascript', css:'css', kt:'text/x-kotlin', java:'text/x-java', json:{name:'javascript',json:true}, xml:'xml', svg:'xml' };
        return map[ext] || 'htmlmixed';
    }

    // ─── Debounce helper ───
    let _saveTimer = null;
    function debouncedSaveFiles() {
        clearTimeout(_saveTimer);
        _saveTimer = setTimeout(() => dbSave('files', files), 500);
    }

    // ─── Tabs & Editor ───
    function renderTabs() {
        const tabBar = document.getElementById('tabBar');
        const wrapper = document.getElementById('editorWrapper');
        tabBar.innerHTML = '';
        wrapper.innerHTML = '';
        editors = {};

        files.forEach((file, idx) => {
            // Tab
            const tab = document.createElement('div');
            tab.className = `tab ${file.active ? 'active' : ''}`;
            const nameSpan = document.createElement('span');
            nameSpan.textContent = file.name;
            nameSpan.style.cursor = 'pointer';
            // Long-press for mobile rename
            let _lpt = null;
            nameSpan.addEventListener('touchstart', (e) => {
                _lpt = setTimeout(() => { e.preventDefault(); renameFile(idx); }, 600);
            }, {passive: false});
            nameSpan.addEventListener('touchend', () => clearTimeout(_lpt));
            nameSpan.addEventListener('touchmove', () => clearTimeout(_lpt));
            // Desktop: dblclick
            nameSpan.ondblclick = e => { e.stopPropagation(); renameFile(idx); };
            const closeSpan = document.createElement('span');
            closeSpan.className = 'tab-close';
            closeSpan.textContent = '✕';
            closeSpan.onclick = e => { e.stopPropagation(); removeFile(idx); };
            tab.appendChild(nameSpan);
            tab.appendChild(closeSpan);
            tab.onclick = () => switchTab(idx);
            tabBar.appendChild(tab);

            // Editor pane
            const pane = document.createElement('div');
            pane.className = `editor-pane ${file.active ? 'active' : ''}`;
            pane.id = `pane-${idx}`;
            wrapper.appendChild(pane);

            // CodeMirror
            const cm = CodeMirror(pane, {
                value: file.content,
                mode: getMode(file.name),
                theme: 'material-darker',
                lineNumbers: true,
                tabSize: 4,
                indentWithTabs: false,
                lineWrapping: true,
                scrollbarStyle: 'native',
                inputStyle: 'contenteditable'
            });
            cm.on('change', () => {
                files[idx].content = cm.getValue();
                debouncedSaveFiles();
            });
            editors[idx] = cm;

            // Refresh active editor after DOM paint
            if (file.active) {
                requestAnimationFrame(() => cm.refresh());
            }
        });

        // Add "+" button
        const addEl = document.createElement('div');
        addEl.className = 'add-tab-btn';
        addEl.textContent = '+ 新規';
        addEl.onclick = addNewFile;
        tabBar.appendChild(addEl);
    }

    function switchTab(idx) {
        files.forEach((f,i) => f.active = (i===idx));
        // Update tab and pane visibility without full re-render
        document.querySelectorAll('.tab').forEach((t,i) => { if(i < files.length) t.className = `tab ${i===idx?'active':''}`; });
        document.querySelectorAll('.editor-pane').forEach((p,i) => { p.className = `editor-pane ${i===idx?'active':''}`; });
        if (editors[idx]) requestAnimationFrame(() => editors[idx].refresh());
        dbSave('files', files);
    }

    function addNewFile() {
        const n = prompt("ファイル名:"); if(!n || !n.trim()) return;
        const name = sanitizeFileName(n.trim());
        if (!name) return;
        if (files.some(f => f.name === name)) { log(`「${name}」は既に存在します`, "err"); return; }
        files.push({name, content:'', active:true});
        renderTabs();
    }
    function renameFile(idx) {
        const newName = prompt("新しいファイル名:", files[idx].name);
        if (!newName || !newName.trim() || newName.trim() === files[idx].name) return;
        const name = sanitizeFileName(newName.trim());
        if (!name) return;
        if (files.some((f, i) => i !== idx && f.name === name)) { log(`「${name}」は既に存在します`, "err"); return; }
        files[idx].name = name;
        if(editors[idx]) editors[idx].setOption('mode', getMode(name));
        dbSave('files', files); renderTabs();
        log(`リネーム → ${name}`, "suc");
    }

    // ファイル名サニタイズ: パストラバーサル防止
    function sanitizeFileName(name) {
        // パス区切り文字と危険な文字を除去
        let clean = name.replace(/[\/\\]/g, '_').replace(/\.\./g, '_');
        // 先頭のドット（隠しファイル）は許容するが、ドットのみは不可
        if (!clean || clean === '.' || clean === '..') {
            log("無効なファイル名です", "err"); return null;
        }
        if (clean !== name) log(`ファイル名を「${clean}」に修正しました`);
        return clean;
    }
    function removeFile(idx) {
        if (files.length === 1) { log("最後のファイルは削除できません","err"); return; }
        files.splice(idx, 1);
        if (!files.some(f=>f.active)) files[Math.max(0,idx-1)].active = true;
        dbSave('files', files); renderTabs();
    }

    // ─── Validation ───
    function validateAppId(appId) {
        if (!/^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]*)+$/.test(appId)) return 'パッケージIDが不正です。例: com.example.app';
        const reserved = ['abstract','assert','boolean','break','byte','case','catch','char','class','const','continue','default','do','double','else','enum','extends','final','finally','float','for','goto','if','implements','import','instanceof','int','interface','long','native','new','package','private','protected','public','return','short','static','strictfp','super','switch','synchronized','this','throw','throws','transient','try','void','volatile','while'];
        for (const s of appId.split('.')) { if(reserved.includes(s)) return `予約語「${s}」は使えません`; }
        return null;
    }

    function exportZip() {
        const appId = document.getElementById('appId').value || 'com.example.app';
        const err = validateAppId(appId);
        if (err) { log(err,"err"); return alert(err); }

    async function executeDeploy() {

        const appId = document.getElementById('appId').value || 'com.example.app';
        const branch = document.getElementById('branchName').value.trim() || 'main';

        await dbSave('app_name', appName);

        await dbSave('branch_name', branch);

        document.getElementById('confirmDeployBtn').disabled = true;
        closeDeployDialog();
        openPipeline();
        const repo = document.getElementById('repoSelect').value;

        try {
            document.getElementById('deployBtn').disabled = true;
            log(`${repo} (${branch}) へデプロイ開始`);

            // Step 1: Upload
            setStep('upload','active','圧縮中...');
            const zip = new JSZip();
            files.filter(f=>!f.name.endsWith('.kt')).forEach(f=>zip.file(f.name,f.content));
            const zipB64 = await zip.generateAsync({type:'base64'});
            setStep('upload','active','送信中...');
            let sha=null; try{sha=(await ghApi('/contents/www.zip')).sha;}catch(e){}
            await ghApi('/contents/www.zip','PUT',{message:"chore: update web assets",content:zipB64,sha});
            setStep('upload','done','完了'); log("www.zip アップロード完了");

            // Step 1.5: Commit build-apk.yml (自己完結型ワークフロー)
            log("build-apk.yml をコミット中...");
            const ymlPath = '/contents/.github/workflows/build-apk.yml';
            let ymlSha = null;
            try { ymlSha = (await ghApi(ymlPath)).sha; } catch(e) {}
            const ymlB64 = btoa(unescape(encodeURIComponent(BUILD_APK_YML)));
            await ghApi(ymlPath, 'PUT', {
                message: "chore: update build-apk.yml workflow",
                content: ymlB64,
                sha: ymlSha
            });
            log("build-apk.yml コミット完了", "suc");

            // Step 2: Commit .kt
            const ktFiles = files.filter(f=>f.name.endsWith('.kt'));
            const ktBase = `app/src/main/java/${appId.replace(/\./g,'/')}`;
            if (ktFiles.length > 0) {
                setStep('commit','active',`0/${ktFiles.length}`);
                for(let i=0;i<ktFiles.length;i++){
                    const f=ktFiles[i]; const rp=`/contents/${ktBase}/${f.name}`;
                    let ks=null; try{ks=(await ghApi(rp)).sha;}catch(e){}
                    await ghApi(rp,'PUT',{message:`chore: update ${f.name}`,content:btoa(unescape(encodeURIComponent(f.content))),sha:ks});
                    setStep('commit','active',`${i+1}/${ktFiles.length}`); log(`${f.name} コミット完了`);
                }
            }
            setStep('commit','done',`${ktFiles.length} files`);

            // Step 3: Trigger
            setStep('trigger','active','dispatch...');
            await ghApi('/actions/workflows/build-apk.yml/dispatches','POST',{ref:branch,inputs:{app_name:appName,app_id:appId}});
            setStep('trigger','done',branch); log("ビルドトリガー完了","suc");

            // Step 4: Get Run ID
            setStep('build','active','Run取得中...');
            await new Promise(r=>setTimeout(r,4000));
            const runs = await ghApi('/actions/workflows/build-apk.yml/runs?per_page=1');
            const runId = runs.workflow_runs[0]?.id;
            if(!runId) throw new Error("Runが見つかりません");
            setStep('build','active',`#${runId}`); log(`Run #${runId} 監視開始`);
            startPolling(runId);

        } catch(e) {
            log("エラー: "+e.message,"err");
            document.querySelectorAll('.pipeline-step.active').forEach(s=>setStep(s.dataset.step,'fail','エラー'));
            document.getElementById('deployBtn').disabled=false; clearInterval(pipelineTimer);
        }
    }

    // ─── Polling ───
    function startPolling(runId) {
        const MAX_POLLS=180, MAX_ERRORS=5;
        let pollCount=0, errorCount=0;
        // ポーリング開始時の認証情報を固定（途中の設定変更に影響されない）
        const pollingToken = document.getElementById('ghToken').value;
        const pollingRepo = document.getElementById('repoSelect').value;
        const pollApi = async (path) => {
            const url = `https://api.github.com/repos/${pollingRepo}${path}`;
            const res = await fetch(url, { headers:{'Authorization':`token ${pollingToken}`,'Accept':'application/vnd.github+json'} });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        };
        const interval = setInterval(async()=>{
            pollCount++;
            if(pollCount>MAX_POLLS){ clearInterval(interval);clearInterval(pipelineTimer); document.getElementById('deployBtn').disabled=false; setStep('build','fail','タイムアウト'); log("30分タイムアウト","err"); return; }
            try {
                const run = await pollApi(`/actions/runs/${runId}`);
                errorCount=0;
                const sm={queued:'キュー中...',in_progress:'ビルド中...',completed:'完了'};
                setStep('build','active',sm[run.status]||run.status);
                log(`状態: ${run.status} (${run.conclusion||'実行中'})`);
                if(run.status==='completed'){
                    clearInterval(interval);clearInterval(pipelineTimer);
                    document.getElementById('deployBtn').disabled=false;
                    if(run.conclusion==='success'){ setStep('build','done','成功'); setStep('done','active','取得中...'); log("ビルド成功！","suc"); showDownload(runId, pollingToken, pollingRepo); }
                    else { setStep('build','fail',run.conclusion); logWithLink(`ビルド失敗: ${run.conclusion}`,run.html_url,"err"); }
                }
            } catch(e){
                errorCount++; log(`監視エラー (${errorCount}/${MAX_ERRORS}): ${e.message}`,"err");
                if(errorCount>=MAX_ERRORS){ clearInterval(interval);clearInterval(pipelineTimer); document.getElementById('deployBtn').disabled=false; setStep('build','fail','通信エラー'); log("ポーリング中断","err"); }
            }
        },10000);
    }

    // ════════════════════════════════════════════════════════════
    // ─── ZIP Import Feature ───
    // ════════════════════════════════════════════════════════════
    const ALLOWED_EXTENSIONS = ['html','htm','css','js','mjs','json','kt','kts','xml','svg','md','txt','java','gradle','properties','yml','yaml'];
    const MAX_FILE_SIZE = 1024 * 1024; // 1MB

    function isAllowedExtension(name) {
        const ext = name.split('.').pop().toLowerCase();
        return ALLOWED_EXTENSIONS.includes(ext);
    }

    function sanitizeImportPath(path) {
        // 先頭スラッシュ除去
        let clean = path.replace(/^\/+/, '');
        // 危険な文字を除去（パストラバーサル防止）
        clean = clean.replace(/\.\./g, '_');
        // 許可：英数字、._-/、日本語
        clean = clean.replace(/[^a-zA-Z0-9._\-\/\u3040-\u309f\u30a0-\u30ff\u4e00-\u9fff]/g, '_');
        if (!clean || clean === '.' || clean === '..') return null;
        return clean;
    }

    function addImportedFile(name, content, stats) {
        if (files.some(f => f.name === name)) {
            stats.skipped++;
            stats.skippedReasons.push(`${name} (重複)`);
            return;
        }
        files.push({ name, content, active: false });
        stats.added++;
    }

    async function processSingleFile(file, stats) {
        if (file.size > MAX_FILE_SIZE) {
            stats.skipped++;
            stats.skippedReasons.push(`${file.name} (1MB超過)`);
            return;
        }
        if (!isAllowedExtension(file.name)) {
            stats.skipped++;
            stats.skippedReasons.push(`${file.name} (拡張子非対応)`);
            return;
        }
        const cleanName = sanitizeImportPath(file.name);
        if (!cleanName) {
            stats.skipped++;
            stats.skippedReasons.push(`${file.name} (名前不正)`);
            return;
        }
        try {
            const content = await file.text();
            addImportedFile(cleanName, content, stats);
        } catch (e) {
            stats.skipped++;
            stats.skippedReasons.push(`${file.name} (読込失敗)`);
        }
    }

    async function processZipFile(file, stats) {
        try {
            const zip = await JSZip.loadAsync(file);
            const entries = [];
            zip.forEach((path, entry) => entries.push({ path, entry }));
            for (const { path, entry } of entries) {
                if (entry.dir) continue;
                // macOS / 隠しファイル除外
                if (path.startsWith('__MACOSX/') || path.includes('/.DS_Store') || path.endsWith('.DS_Store')) continue;
                const baseName = path.split('/').pop();
                if (baseName.startsWith('.')) continue;
                if (!isAllowedExtension(path)) {
                    stats.skipped++;
                    stats.skippedReasons.push(`${path} (拡張子非対応)`);
                    continue;
                }
                const cleanPath = sanitizeImportPath(path);
                if (!cleanPath) {
                    stats.skipped++;
                    stats.skippedReasons.push(`${path} (名前不正)`);
                    continue;
                }
                try {
                    const content = await entry.async("string");
                    if (content.length > MAX_FILE_SIZE) {
                        stats.skipped++;
                        stats.skippedReasons.push(`${path} (1MB超過)`);
                        continue;
                    }
                    addImportedFile(cleanPath, content, stats);
                } catch (e) {
                    stats.skipped++;
                    stats.skippedReasons.push(`${path} (展開失敗)`);
                }
            }
        } catch (e) {
            log(`ZIP展開エラー (${file.name}): ${e.message}`, "err");
        }
    }

    async function handleImport(input) {
        const filesArray = Array.from(input.files);
        if (filesArray.length === 0) return;
        const stats = { added: 0, skipped: 0, skippedReasons: [] };
        log(`インポート開始: ${filesArray.length} 個の項目`);
        for (const file of filesArray) {
            if (file.name.toLowerCase().endsWith('.zip')) {
                await processZipFile(file, stats);
            } else {
                await processSingleFile(file, stats);
            }
        }
        if (stats.added > 0) {
            renderTabs();
            await dbSave('files', files);
        }
        const msg = `インポート完了: 取込${stats.added}件 / スキップ${stats.skipped}件`;
        log(msg, stats.added > 0 ? "suc" : "");
        if (stats.skippedReasons.length > 0 && stats.skippedReasons.length <= 10) {
            stats.skippedReasons.forEach(r => log(`  skip: ${r}`));
        } else if (stats.skippedReasons.length > 10) {
            stats.skippedReasons.slice(0, 10).forEach(r => log(`  skip: ${r}`));
            log(`  ...他 ${stats.skippedReasons.length - 10} 件`);
        }
        input.value = ''; // 同じファイルを再選択可能にする
    }

    // ─── Multi-AI Provider Adapters ───
    // ════════════════════════════════════════════════════════════
    function stripCodeFence(text) {
        if (!text) return '';
        let t = text.trim();
        // 先頭 ```kotlin or ``` を除去
        t = t.replace(/^```(?:kotlin|kt|java)?\s*\n?/i, '');
        // 末尾 ``` を除去
        t = t.replace(/\n?```\s*$/i, '');
        return t.trim();
    }

    async function callClaude(key, model, sys, user) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'x-api-key': key,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true',
                'content-type': 'application/json'
            },
            body: JSON.stringify({
                model: model,
                max_tokens: 32000,
                system: sys,
                messages: [{ role: 'user', content: user }]
            })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(`[Claude] ${res.status}: ${data.error?.message || JSON.stringify(data)}`);
        }
        if (!data.content || !data.content[0]) {
            throw new Error('[Claude] 応答が空です');
        }
        return data.content[0].text;
    }

    async function callOpenAI(key, model, sys, user) {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${key}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: model,
                max_tokens: 32000,
                messages: [
                    { role: 'system', content: sys },
                    { role: 'user', content: user }
                ]
            })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(`[OpenAI] ${res.status}: ${data.error?.message || JSON.stringify(data)}`);
        }
        if (!data.choices || !data.choices[0]) {
            throw new Error('[OpenAI] 応答が空です');
        }
        return data.choices[0].message.content;
    }

    async function callGemini(key, model, sys, user) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                system_instruction: { parts: [{ text: sys }] },
                contents: [{ role: 'user', parts: [{ text: user }] }],
                generationConfig: { temperature: 0.2, maxOutputTokens: 32000 }
            })
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(`[Gemini] ${res.status}: ${data.error?.message || JSON.stringify(data)}`);
        }
        if (!data.candidates || !data.candidates[0]) {
            throw new Error('[Gemini] AIが応答を拒否しました（safety blockの可能性）');
        }
        const parts = data.candidates[0].content?.parts || [];
        const textPart = parts.find(p => p.text);
        if (!textPart) throw new Error('[Gemini] テキスト応答がありません');
        return textPart.text;
    }

    async function callXai(key, model, sys, user) {
        const res = await fetch('https://api.x.ai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${key}`,

        }

    async function callAI(provider, key, model, sys, user) {
        switch (provider) {
            case 'claude': return await callClaude(key, model, sys, user);
            case 'openai': return await callOpenAI(key, model, sys, user);
            case 'gemini': return await callGemini(key, model, sys, user);
            case 'xai':    return await callXai(key, model, sys, user);
            default: throw new Error(`未知のプロバイダ: ${provider}`);
        }
    }

    function upsertKotlinFile(content) {
        const existing = files.findIndex(f => f.name === 'MainActivity.kt');
        if (existing >= 0) {
            files[existing].content = content;
            files.forEach((f, i) => f.active = (i === existing));
        } else {
            files.forEach(f => f.active = false);
            files.push({ name: 'MainActivity.kt', content, active: true });
        }
    }

    async function translateToKotlin() {
        if (isTranslating) {
            log("翻訳処理が既に実行中です", "err");
            return;
        }
        // アクティブプロバイダ取得
        const provider = await dbGet('ai_provider') || 'claude';
        const key = await dbGet(`apiKey_${provider}`);
        if (!key) {
            log(`${AI_MODELS[provider].name} のAPIキーが未設定です。設定画面を開きます`, "err");
            document.getElementById('settingsOverlay').classList.add('active');
            return;
        }
        const model = (await dbGet(`model_${provider}`)) || AI_MODELS[provider].default;

        // index.html取得
        const htmlFile = files.find(f => f.name === 'index.html');
        if (!htmlFile) {
            log("index.html が見つかりません", "err");
            return;
        }

        isTranslating = true;
        const btn = document.getElementById('translateBtn');
        btn.disabled = true;
        btn.textContent = '⏳';
        openPipeline();
        setStep('trigger', 'active', `${provider} 翻訳中...`);
        log(`${AI_MODELS[provider].name} (${model}) で翻訳開始`);

        try {
            const userPrompt = `以下のHTMLをMainActivity.ktに変換してください:\n\n${htmlFile.content}`;
            const result = await callAI(provider, key, model, KOTLIN_TRANSLATION_PROMPT, userPrompt);
            const kotlinCode = stripCodeFence(result);
            if (!kotlinCode || kotlinCode.length < 50) {
                throw new Error('生成されたコードが短すぎます');
            }
            upsertKotlinFile(kotlinCode);
            renderTabs();
            await dbSave('files', files);
            setStep('trigger', 'done', 'AI翻訳完了');
            log("MainActivity.kt を生成しました", "suc");
        } catch (e) {
            setStep('trigger', 'fail', 'エラー');
            log(`翻訳エラー: ${e.message}`, "err");
        } finally {
            isTranslating = false;
            btn.disabled = false;
            btn.textContent = '🤖';
        }
    }

        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            const errText = await res.text();
            throw new Error(`[Gemini Image] ${res.status}: ${errText.slice(0, 200)}`);
        }
        const data = await res.json();
        if (!data.candidates || !data.candidates[0]) {
            throw new Error('[Gemini Image] AIが応答を拒否しました');
        }
        const parts = data.candidates[0].content?.parts || [];
        const imagePart = parts.find(p => p.inlineData && p.inlineData.data);
        if (!imagePart) {
            throw new Error('[Gemini Image] 画像が返却されませんでした');
        }
        const mime = imagePart.inlineData.mimeType || 'image/png';
        return `data:${mime};base64,${imagePart.inlineData.data}`;
    }

    function applyCustomIcon(dataUrl) {
        const fav = document.getElementById('dynamicFavicon');
        const apple = document.getElementById('dynamicAppleIcon');
        if (fav) fav.href = dataUrl;
        if (apple) apple.href = dataUrl;
        // manifest再構築
        initPWA(dataUrl);
        // プレビュー更新
        const preview = document.getElementById('iconPreview');
        if (preview) {
            preview.innerHTML = '';
            const img = document.createElement('img');
            img.src = dataUrl;
            preview.appendChild(img);
        }
    }

    async function generateIcon() {
        if (isGeneratingIcon) {
            log("アイコン生成処理が既に実行中です", "err");
            return;
        }
        const geminiKey = await dbGet('apiKey_gemini');
        if (!geminiKey) {
            log("Gemini APIキーが未設定です。設定画面のGemini項目を開きます", "err");
            // Geminiセクションを自動展開
            const block = document.querySelector('details.provider-block[data-provider="gemini"]');
            if (block) block.open = true;
            return;
        }
        const model = document.getElementById('iconModel').value || AI_IMAGE_MODELS.gemini.default;

        isGeneratingIcon = true;
        const btn = document.getElementById('generateIconBtn');
        btn.disabled = true;
        btn.textContent = '⏳ 生成中...';
        log(`アイコン生成開始: ${model}`);

        try {
            const dataUrl = await generateIconWithGemini(geminiKey, model);
            await dbSave('customIcon', dataUrl);
            applyCustomIcon(dataUrl);
            log("アイコン生成完了", "suc");
        } catch (e) {
            log(`アイコン生成エラー: ${e.message}`, "err");
        } finally {
            isGeneratingIcon = false;
            btn.disabled = false;
            btn.textContent = '🎨 アイコンを生成';
        }
    }

    async function resetIcon() {
        if (!confirm("アイコンをデフォルトに戻しますか？")) return;
        await dbSave('customIcon', null);
        const defaultDataUrl = 'data:image/svg+xml;base64,' + btoa(DEFAULT_ICON_SVG);
        applyCustomIcon(defaultDataUrl);
        const preview = document.getElementById('iconPreview');
        if (preview) {
            preview.innerHTML = '<div class="icon-empty">デフォルト</div>';
        }
        log("アイコンをデフォルトに戻しました", "suc");
    }

    // ════════════════════════════════════════════════════════════
    // ─── PWA (Manifest dynamic injection) ───
    // ════════════════════════════════════════════════════════════
    let _manifestBlobUrl = null;
    function buildManifest(iconDataUrl) {
        return {
            name: "Cloud IDE Ultra+",
            short_name: "CloudIDE",
            description: "Mobile-first cloud IDE for Android APK builds",
            start_url: ".",
            display: "standalone",
            orientation: "any",
            background_color: "#0d1117",
            theme_color: "#0d1117",
            icons: [
                {
                    src: iconDataUrl,
                    sizes: "any",
                    type: iconDataUrl.startsWith('data:image/svg') ? "image/svg+xml" : "image/png",
                    purpose: "any maskable"
                }
            ]
        };
    }

    function initPWA(iconDataUrl) {
        try {
            if (!iconDataUrl) {
                iconDataUrl = 'data:image/svg+xml;base64,' + btoa(DEFAULT_ICON_SVG);
            }
            const manifest = buildManifest(iconDataUrl);
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            // 古いBlob URLを破棄
            if (_manifestBlobUrl) {
                URL.revokeObjectURL(_manifestBlobUrl);
            }
            _manifestBlobUrl = URL.createObjectURL(blob);
            // 既存のmanifest linkを探す or 作成
            let link = document.querySelector('link[rel="manifest"]');
            if (!link) {
                link = document.createElement('link');
                link.rel = 'manifest';
                document.head.appendChild(link);
            }
            link.href = _manifestBlobUrl;
        } catch (e) {
            console.error('PWA init error:', e);
        }
    }

    // ════════════════════════════════════════════════════════════
    // ─── Settings UI Builder (AI Providers) ───
    // ════════════════════════════════════════════════════════════
    async function buildAISettingsUI() {
        const container = document.getElementById('providerBlocks');
        if (!container) return;
        const activeProvider = (await dbGet('ai_provider')) || 'claude';
        document.getElementById('activeProvider').value = activeProvider;

        container.innerHTML = '';
        for (const [pid, cfg] of Object.entries(AI_MODELS)) {
            const savedKey = (await dbGet(`apiKey_${pid}`)) || '';
            const savedModel = (await dbGet(`model_${pid}`)) || cfg.default;

            const details = document.createElement('details');
            details.className = 'provider-block';
            details.dataset.provider = pid;
            if (pid === activeProvider) details.open = true;

            const summary = document.createElement('summary');
            const titleSpan = document.createElement('span');
            titleSpan.textContent = cfg.name;
            summary.appendChild(titleSpan);
            if (pid === activeProvider) {
                const badge = document.createElement('span');
                badge.className = 'provider-badge-active';
                badge.textContent = 'ACTIVE';
                summary.appendChild(badge);
            }
            details.appendChild(summary);

            const body = document.createElement('div');
            body.className = 'provider-body';

            // API Key field
            const keyGroup = document.createElement('div');
            keyGroup.className = 'field-group';
            keyGroup.style.marginTop = '12px';
            const keyLabel = document.createElement('label');
            keyLabel.textContent = 'API Key';
            const keyInput = document.createElement('input');
            keyInput.type = 'password';
            keyInput.id = `apiKeyInput_${pid}`;
            keyInput.value = savedKey;
            keyInput.autocapitalize = 'none';
            keyInput.autocorrect = 'off';
            keyInput.spellcheck = false;
            keyInput.placeholder = pid === 'claude' ? 'sk-ant-...' :
                                   pid === 'openai' ? 'sk-...' :
                                   pid === 'gemini' ? 'AIza...' : 'xai-...';
            keyGroup.appendChild(keyLabel);
            keyGroup.appendChild(keyInput);
            body.appendChild(keyGroup);

            // Model select
            const modelGroup = document.createElement('div');
            modelGroup.className = 'field-group';
            const modelLabel = document.createElement('label');
            modelLabel.textContent = 'Model';
            const modelSelect = document.createElement('select');
            modelSelect.id = `modelSelect_${pid}`;
            cfg.models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.label;
                if (m.id === savedModel) opt.selected = true;
                modelSelect.appendChild(opt);
            });
            modelGroup.appendChild(modelLabel);
            modelGroup.appendChild(modelSelect);
            body.appendChild(modelGroup);

            details.appendChild(body);
            container.appendChild(details);
        }

        // Icon model select
        const iconSelect = document.getElementById('iconModel');
        if (iconSelect) {
            iconSelect.innerHTML = '';
            const savedIconModel = (await dbGet('iconModel')) || AI_IMAGE_MODELS.gemini.default;
            AI_IMAGE_MODELS.gemini.models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.textContent = m.label;
                if (m.id === savedIconModel) opt.selected = true;
                iconSelect.appendChild(opt);
            });
        }

        // Icon preview
        const customIcon = await dbGet('customIcon');
        const preview = document.getElementById('iconPreview');
        if (preview) {
            preview.innerHTML = '';
            if (customIcon) {
                const img = document.createElement('img');
                img.src = customIcon;
                preview.appendChild(img);
            } else {
                const empty = document.createElement('div');
                empty.className = 'icon-empty';
                empty.textContent = 'デフォルト';
                preview.appendChild(empty);
            }
        }
    }

    async function saveAISettings() {
        const activeProvider = document.getElementById('activeProvider').value;
        await dbSave('ai_provider', activeProvider);
        for (const pid of Object.keys(AI_MODELS)) {
            const keyEl = document.getElementById(`apiKeyInput_${pid}`);
            const modelEl = document.getElementById(`modelSelect_${pid}`);
            if (keyEl) await dbSave(`apiKey_${pid}`, keyEl.value);
            if (modelEl) await dbSave(`model_${pid}`, modelEl.value);
        }
        const iconModelEl = document.getElementById('iconModel');
        if (iconModelEl) await dbSave('iconModel', iconModelEl.value);
    }

    // ─── Settings ───
    // ─── Settings dirty check ───
    let _settingsSnapshot = null;
    function captureSettingsSnapshot() {
        const snap = {};
        // GitHub 関連
        snap.ghToken = document.getElementById('ghToken')?.value || '';
        snap.repoSelect = document.getElementById('repoSelect')?.value || '';
        // AI アクティブプロバイダ
        snap.activeProvider = document.getElementById('activeProvider')?.value || '';
        // 各プロバイダのキーとモデル
        for (const pid of Object.keys(AI_MODELS)) {
            const keyEl = document.getElementById(`apiKeyInput_${pid}`);
            const modelEl = document.getElementById(`modelSelect_${pid}`);
            if (keyEl) snap[`apiKey_${pid}`] = keyEl.value;
            if (modelEl) snap[`model_${pid}`] = modelEl.value;
        }
        // アイコンモデル
        snap.iconModel = document.getElementById('iconModel')?.value || '';
        return snap;
    }

    function isSettingsDirty() {
        if (!_settingsSnapshot) return false;
        const current = captureSettingsSnapshot();
        for (const key of Object.keys(current)) {
            if (current[key] !== _settingsSnapshot[key]) return true;
        }
        for (const key of Object.keys(_settingsSnapshot)) {
            if (!(key in current)) return true;
        }
        return false;
    }

    document.getElementById('openSettingsBtn').onclick = ()=>{
        document.getElementById('settingsOverlay').classList.add('active');
        // 開いた時点のスナップショットを保存
        _settingsSnapshot = captureSettingsSnapshot();
    };
    async function closeSettings() {
        if (isSettingsDirty()) {
            const ans = confirm("変更があります。保存しますか？\n\nOK = 保存して閉じる\nキャンセル = 破棄して閉じる");
            if (ans) {
                // 保存して閉じる
                const r = document.getElementById('repoSelect').value;
                await dbSave('gh_token', document.getElementById('ghToken').value);
                await dbSave('selected_repo', r);
                await saveAISettings();
                document.getElementById('activeRepoDisplay').textContent = r ? r.split('/')[1] : '未接続';
                await buildAISettingsUI();
                log("設定を保存しました", "suc");
            } else {
                // 破棄して閉じる: 保存済みの値でUIを再構築
                await buildAISettingsUI();
                const savedToken = await dbGet('gh_token') || '';
                const savedRepo = await dbGet('selected_repo') || '';
                document.getElementById('ghToken').value = savedToken;
                if (document.getElementById('repoSelect')) {
                    document.getElementById('repoSelect').value = savedRepo;
                }
                log("変更を破棄しました");
            }
        }
        _settingsSnapshot = null;
        document.getElementById('settingsOverlay').classList.remove('active');
    }
    document.getElementById('saveSettingsBtn').onclick = async()=>{
        const r=document.getElementById('repoSelect').value;
        await dbSave('gh_token',document.getElementById('ghToken').value);
        await dbSave('selected_repo',r);
        await saveAISettings();
        document.getElementById('activeRepoDisplay').textContent = r ? r.split('/')[1] : '未接続';
        // 設定保存後にAIプロバイダUIを再構築（ACTIVEバッジを更新）
        await buildAISettingsUI();
        closeSettings();
    };
    document.getElementById('verifyTokenBtn').onclick = fetchRepos;

    // ─── Viewport resize (virtual keyboard) ───
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            const i = files.findIndex(f => f.active);
            if (editors[i]) editors[i].refresh();
        });
    }

    // ─── Init ───
    window.onload = async()=>{
        try {
            files = await dbGet('files') || files;
            document.getElementById('ghToken').value = await dbGet('gh_token') || '';
            document.getElementById('appName').value = await dbGet('app_name') || 'My App';
            document.getElementById('appId').value = await dbGet('app_id') || 'com.example.app';
            document.getElementById('branchName').value = await dbGet('branch_name') || 'main';
            const r = await dbGet('selected_repo');
            if(r) document.getElementById('activeRepoDisplay').textContent = r.split('/')[1];
            renderTabs();
            // AI設定UI構築
            await buildAISettingsUI();
            // カスタムアイコン適用 + PWA初期化
            const customIcon = await dbGet('customIcon');
            if (customIcon) {
                applyCustomIcon(customIcon);
            } else {
                initPWA();
            }
            if(document.getElementById('ghToken').value) fetchRepos();
        } catch(e) { console.error('Init:',e); renderTabs(); log("データ読み込み失敗","err"); try { initPWA(); } catch(_){} }
    };
</script>
